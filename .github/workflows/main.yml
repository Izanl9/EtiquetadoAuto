name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Forzar uso de SDK 8 (global.json)
      run: |
        echo '{
          "sdk": {
            "version": "8.0.403",
            "rollForward": "latestFeature"
          }
        }' > global.json 
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.403'

    - name: Instalar Workloads
      run: dotnet workload install maui-android wasm-tools

    - name: Restaurar dependencias
      run: |
        dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org || true
        dotnet restore EtiquetadoAuto.csproj --no-cache  
    
    - name: Limpiar y Compilar
      # Añadimos --no-cache para evitar que use archivos temporales corruptos
      run: |
        dotnet restore EtiquetadoAuto.csproj --no-cache
        dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/bin/Release/net8.0-android/*.apk