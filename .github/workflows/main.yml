name: Compilar App Android

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Test de Conexión NuGet
      run: curl -I https://api.nuget.org/v3/index.json

    - name: Instalar Workload y SDK
      run: |
        dotnet workload install maui-android
        # Esto asegura que el compilador tenga las librerías de Android necesarias
        dotnet build EtiquetadoAuto.csproj -t:InstallAndroidDependencies -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT

    - name: Compilar APK
      run: |
        dotnet build EtiquetadoAuto.csproj \
          -c Release \
          -f net8.0-android \
          -p:AndroidKeyStore=false \
          -p:CheckEolTargetFramework=false