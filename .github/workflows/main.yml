name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_ROLL_FORWARD: LatestMajor
  CheckEolTargetFramework: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar Workloads
      # Usamos sudo y forzamos la instalación para evitar bloqueos del SDK 10
      run: dotnet workload install maui-android wasm-tools --ignore-failed-sources

    - name: Restaurar dependencias
      # Definimos la variable de entorno justo antes del comando para asegurar que se lea
      run: |
        export CheckEolTargetFramework=false
        dotnet restore EtiquetadoAuto.csproj -p:CheckEolTargetFramework=false

    - name: Compilar APK (Release)
      run: |
        export CheckEolTargetFramework=false
        dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:RuntimeIdentifier=android-arm64 -p:StaticWebAssetsEnabled=true -p:CheckEolTargetFramework=false --no-restore

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/*.apk