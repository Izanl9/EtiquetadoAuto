name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar .NET 8 (Versión exacta)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.403' # Forzamos una versión estable de la rama 8

    - name: Crear global.json
      # Esto obliga a cualquier comando dotnet a usar la versión 8, ignorando la 10
      run: |
        echo '{
          "sdk": {
            "version": "8.0.403",
            "rollForward": "latestFeature"
          }
        }' > global.json

    - name: Crear NuGet.config
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          </packageSources>
        </configuration>' > NuGet.config

    - name: Instalar Workloads MAUI
      run: dotnet workload install maui-android

    - name: Restaurar dependencias
      # Añadimos el flag para ignorar el aviso de fin de soporte (EOL)
      run: dotnet restore EtiquetadoAuto.csproj --configfile NuGet.config -p:CheckEolTargetFramework=false

    - name: Compilar APK (Release)
      run: dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:AndroidKeyStore=false -p:CheckEolTargetFramework=false --no-restore

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/bin/Release/net8.0-android/*.apk